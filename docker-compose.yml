services:
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    networks:
      - backend
    healthcheck:
      # Use wget — neo4j:5-community includes wget but not curl
      test: ["CMD", "sh", "-c", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  graph-mcp-vault:
    image: ghcr.io/harmellis/graph-mcp-vault:0.0.12
    env_file:
      - path: .env
        required: false
    environment:
      OIDC_ISSUER: ${OIDC_ISSUER}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE}
      PUBLIC_URL: ${PUBLIC_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      SCOPES_ALLOWLIST: ${SCOPES_ALLOWLIST:-openid,profile,email}
    ports:
      - "8000:8000"
    networks:
      - backend
      - frontend
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

networks:
  backend:
    internal: true
  frontend:

volumes:
  neo4j_data:
