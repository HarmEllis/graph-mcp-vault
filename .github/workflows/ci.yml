name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint, typecheck, test, build ─────────────────────────────────────────────
  CI:
    name: CI
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@a3252b7982687598ad1176f664d29e6be63e6d86  # v3.0.0
        with:
          version: latest

      - name: Set up Node.js 24
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e  # v4.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Lint & format check
        run: pnpm biome check .

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Run tests
        run: pnpm test
        env:
          # testcontainers pulls images from Docker Hub; no extra config needed on
          # ubuntu-24.04 runners which ship with Docker pre-installed.
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Build
        run: pnpm build

  # ── Docker build smoke-test ───────────────────────────────────────────────────
  docker-build:
    name: Docker build check
    needs: CI
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5730b4a63a06c4e3d8cad62bcc9f03e65e52f8f  # v3.10.0

      - name: Build Docker image (no push)
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: .
          push: false
          platforms: linux/amd64
          cache-from: type=gha,scope=docker-ci
          cache-to: type=gha,mode=max,scope=docker-ci
