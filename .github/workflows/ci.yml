name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint, typecheck, test, build ─────────────────────────────────────────────
  CI:
    name: CI
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d  # v3.0.0
        with:
          version: latest

      - name: Set up Node.js 24
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e  # v4.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Lint & format check
        run: pnpm biome check .

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Run tests
        run: pnpm test
        env:
          # testcontainers pulls images from Docker Hub; no extra config needed on
          # ubuntu-24.04 runners which ship with Docker pre-installed.
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Build
        run: pnpm build

  # ── Lint workflow files ───────────────────────────────────────────────────────
  actionlint:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install actionlint
        run: |
          VERSION=1.7.7
          curl -sSfL \
            "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/actionlint_${VERSION}_linux_amd64.tar.gz" \
            | tar xz actionlint
          sudo mv actionlint /usr/local/bin/

      - name: Run actionlint
        run: actionlint

  # ── Validate pinned action SHAs ───────────────────────────────────────────────
  validate-pins:
    name: Validate pinned action SHAs
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Verify all pinned SHAs resolve
        run: bash scripts/ci/validate-pins.sh
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Node 24 policy check ─────────────────────────────────────────────────────
  node-policy:
    name: Node 24 policy check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d  # v3.0.0
        with:
          version: latest

      - name: Set up Node.js 24
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e  # v4.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Node 24 policy
        run: pnpm tsx scripts/ci/check-node-policy.ts

  # ── Docker build smoke-test ───────────────────────────────────────────────────
  docker-build:
    name: Docker build check
    needs: CI
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Build Docker image (no push)
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: .
          push: false
          platforms: linux/amd64
          cache-from: type=gha,scope=docker-ci
          cache-to: type=gha,mode=max,scope=docker-ci
